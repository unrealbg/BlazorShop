<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorShop</title>
    <base href="/" />

    <!-- Tailwind (built locally) -->
    <link href="css/site.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome for toast icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
      integrity="sha512-SfZ6P35JQDsGxv3rSx1x4Q0x1G2m4GvYB1x0xXzj5vQGxZB9e4Nf1n5T0k9r7E5J+9a5mTQq1O1T1p5x5i5yFw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="css/app.css" />
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.png" />
    <link href="BlazorShop.Web.styles.css" rel="stylesheet" />

    <link href="css/input.css" rel="stylesheet" />
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="site-bg">
    <div id="app">
      <div class="loader_main">
        <div class="spinner" aria-label="Loading"></div>
        <div class="loading-progress-text"></div>
      </div>
    </div>

    <div id="blazor-error-ui" class="error-popup">
      <div class="error-content">
        <div class="error-message">
          <span class="error-icon">⚠️</span>
          <div>
            <div class="error-text">An unexpected error occurred</div>
            <div
              class="error-subtext"
              style="font-size: 0.9rem; color: #444; margin-top: 2px"
            >
              Sorry for the inconvenience. Please try again. If the problem
              persists, reload the page.
            </div>
          </div>
        </div>
        <div class="error-actions">
          <a href="#" class="reload reload-btn">Try again</a>
          <a class="dismiss" title="Close">🗙</a>
        </div>
      </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
  </body>
</html>

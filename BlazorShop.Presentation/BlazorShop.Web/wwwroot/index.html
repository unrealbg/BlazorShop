<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://images.unsplash.com https://localhost:7094; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://localhost:7094 https://localhost:7095 wss://localhost:7094 wss://localhost:7095 http://localhost:* https://localhost:* ws://localhost:* wss://localhost:*; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorShop</title>
    <base href="/" />

    <!-- Tailwind + fonts (hosted locally) -->
    <link href="css/fonts.css" rel="stylesheet" />
    <link href="css/site.css" rel="stylesheet" />

    <!-- Font Awesome for toast icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
      integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="css/app.css" />
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.png" />
    <link href="BlazorShop.Web.styles.css" rel="stylesheet" />

    <link href="css/input.css" rel="stylesheet" />
    <script type="module" src="js/app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"
      integrity="sha384-JUh163oCRItcbPme8pYnROHQMC6fNKTBWtRG3I3I0erJkzNgL7uxKlNwcrcFKeqF"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>

  <body class="site-bg">
    <div id="app">
      <div class="loader_main">
        <div class="spinner" aria-label="Loading"></div>
        <div class="loading-progress-text"></div>
      </div>
    </div>

    <div id="blazor-error-ui" class="error-popup">
      <div class="error-content">
        <div class="error-message">
          <span class="error-icon">⚠️</span>
          <div>
            <div class="error-text">An unexpected error occurred</div>
            <div class="error-subtext">
              Sorry for the inconvenience. Please try again. If the problem
              persists, reload the page.
            </div>
          </div>
        </div>
        <div class="error-actions">
          <a href="#" class="reload reload-btn">Try again</a>
          <a class="dismiss" title="Close">🗙</a>
        </div>
      </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
  </body>
</html>
